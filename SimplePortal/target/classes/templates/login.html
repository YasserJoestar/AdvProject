<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            background-color: #0b1f3a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f1c40f;
        }
        .container {
            background-color: #112b52;
            padding: 30px;
            border-radius: 10px;
            max-width: 400px;
            width: 100%;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-bottom: 50px;
        }
        h4 { margin-top:0; color:#f1c40f; font-size:1.5rem; text-align:center; }
        label { color:#f1c40f; display:block; margin-bottom:10px; font-weight:bold; }
        input[type="text"], input[type="password"], select {
            width:100%; padding:12px; margin-bottom:20px;
            border:1px solid #f1c40f; border-radius:5px;
            background-color:#ffffff; color:#0b1f3a;
            box-sizing:border-box; font-size:14px;
        }
        button {
            background-color:#f1c40f; color:#0b1f3a; border:none;
            border-radius:5px; padding:15px; font-size:16px;
            font-weight:bold; cursor:pointer; transition:0.3s ease; width:100%;
        }
        button:hover { background-color:#d4ac0d; }
        .alert {
            padding:10px 14px; border-radius:5px; margin-bottom:15px;
            font-size:14px; font-weight:bold; text-align:center;
        }
        .alert-error   { background-color:#c0392b; color:#fff; }
        a { color:#f1c40f; text-decoration:none; }
        a:hover { color:#d4ac0d; text-decoration:underline; }
        .divider { border-top:1px solid #2a4a7a; margin:18px 0; }
    </style>
</head>
<body>
<div class="container">
    <h4> Simple Portal</h4>
    <div class="alert alert-error" th:if="${param.error != null}"
         th:text="${param.error[0] == 'empty' ? 'Please enter your email and password.' : (param.error[0] == 'invalid' ? 'Invalid email or password. Try again.' : 'Login failed. Please try again.')}">
    </div>

    <form th:action="@{/authenticate}" th:object="${loginForm}" method="post">
        <label for="username">Email / Username</label>
        <input id="username" type="text" th:field="*{username}" placeholder="Enter email or username" required>

        <label for="password">Password</label>
        <input id="password" type="password" th:field="*{password}" placeholder="Enter password" required>

        <button type="submit">Login</button>
    </form>

    <div class="divider"></div>
    <div style="text-align:center;">
        <a th:href="@{/signup}">Don't have an account? Sign up</a>
    </div>
</div>
</body>
</html>
