<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Payment Success</title>
    <style>
        :root {
            --main-blue: #003366;
            --light-blue: #f4f8fc;
            --accent-yellow: #FFD700;
            --white: #ffffff;
        }
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: var(--light-blue);
        }
        .header {
            background: var(--main-blue);
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 22px;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background: var(--white);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        a, button {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
        }
        .btn-primary {
            background: var(--main-blue);
            color: white;
        }
        .btn-secondary {
            background: var(--accent-yellow);
            color: var(--main-blue);
        }
    </style>
</head>
<body>
<div th:replace="fragments/cookies :: cookieBanner"></div>
<div class="header">Payment Status</div>
<div class="container">
    <h2>Payment Successful</h2>
    <p>Your payment has been confirmed.</p>
    <a class="btn-secondary" th:href="@{/dashboard}">Back to Dashboard</a>
    <a class="btn-primary" th:href="@{/payment}">Make Another Payment</a>
</div>
</body>
</html>
