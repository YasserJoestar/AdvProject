<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>GPA Calculator</title>

    <style>
        body {
            background-color: #0b1f3a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #f1c40f;
        }

        .table-container {
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
        }

        .container {
            background-color: #112b52;
            padding: 24px;
            border-radius: 10px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            margin-bottom: 24px;
        }

        h1, h4 {
            margin-top: 0;
            color: #f1c40f;
        }

        label {
            color: #f1c40f;
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
        }

        input[type="text"], input[type="number"], select {
            width: 100%;
            padding: 12px;
            margin-bottom: 14px;
            border: 1px solid #f1c40f;
            border-radius: 5px;
            background-color: #ffffff;
            color: #0b1f3a;
            box-sizing: border-box;
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }

        button {
            background-color: #f1c40f;
            color: #0b1f3a;
            border: none;
            border-radius: 5px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            background-color: #d4ac0d;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background-color: #112b52;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #f1c40f;
            color: #f1c40f;
        }

        th {
            background-color: #0b1f3a;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 1px;
        }

        tr:hover {
            background-color: #1b3b6f;
        }

        .summary {
            margin-bottom: 15px;
            background-color: #112b52;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            gap: 20px;
            font-weight: bold;
        }

        .links a {
            color: #f1c40f;
            text-decoration: none;
            font-weight: bold;
            margin-right: 12px;
        }
    </style>
</head>
<body>
<div th:replace="fragments/cookies :: cookieBanner"></div>
<div class="table-container">
    <h1>GPA Calculator</h1>
    <div class="links" style="margin-bottom: 15px;">
        <a th:href="@{/dashboard}">Back to Dashboard</a>
        <a th:href="@{/grades}">Grades Page</a>
    </div>

    <div class="container">
        

    <div class="summary">
        <div>Total Credit Hours: <span th:text="${totalHours}">0</span></div>
        <div>GPA: <span th:text="${#numbers.formatDecimal(gpa,1,2)}">0.00</span></div>
    </div>

    <table>
        <thead>
        <tr>
            <th>Course Name</th>
            <th>Code</th>
            <th>Grade</th>
            <th>Hours</th>
        </tr>
        </thead>
        <tbody>
        <tr th:if="${#lists.isEmpty(courses)}">
            <td colspan="4">No courses yet.</td>
        </tr>
        <tr th:each="course : ${courses}">
            <td th:text="${course.courseName}"></td>
            <td th:text="${course.courseCode}"></td>
            <td th:text="${course.grade}"></td>
            <td th:text="${course.creditHours}"></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
