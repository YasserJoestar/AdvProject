<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>sign up</title>
   <style>
    body {
    background-color: #0b1f3a; /* deep blue */
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    margin: 0;
    padding: 40px 20px;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    color: #f1c40f; /* yellow text */
    }

    .container {
    background-color: #112b52;
    padding: 30px;
    border-radius: 10px;
    max-width: 400px;
    width: 100%;
    display: flex;
    flex-direction: column;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
    margin-bottom: 50px;
    }

    h4 {
    margin-top: 0;
    color: #f1c40f;
    font-size: 1.5rem;
    text-align: center;
    }

    label {
    color: #f1c40f;
    display: block;
    margin-bottom: 10px;
    font-weight: bold;
    }

    input[type="text"],
    select {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid #f1c40f;
    border-radius: 5px;
    background-color: #ffffff;
    color: #0b1f3a;
    box-sizing: border-box;
    font-size: 14px;
    }


    button {
    background-color: #f1c40f; /* yellow */
    color: #0b1f3a; /* blue text */
    border: none;
    border-radius: 5px;
    padding: 15px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s ease;
    }

    button:hover {
    background-color: #d4ac0d; /* darker yellow */
    }

    table {
    width: 100%;
    max-width: 800px;
    border-collapse: collapse;
    background-color: #112b52;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    }

    th, td {
    padding: 15px;
    text-align: left;
    border-bottom: 1px solid #f1c40f;
    color: #f1c40f;
    }

    th {
    background-color: #0b1f3a;
    color: #f1c40f;
    text-transform: uppercase;
    font-size: 12px;
    letter-spacing: 1px;
    }

    tr:hover {
    background-color: #1b3b6f;
    }

    tr:last-child td {
    border-bottom: none;
    }
    a {
        color: #f1c40f; /* yellow */
        text-decoration: none;
    }

    a:hover {
        color: #d4ac0d; /* darker yellow on hover */
        text-decoration: underline;
    }
    </style>
</head>
<body>
<div class="container">
    <h4>Sign up</h4>
    <form th:action="@{/signup}" th:object="${signupForm}" method="post">
        <label for="email">email:</label>
        <input id="email" type="text" th:field="*{email}" placeholder="Enter email">

        <label for="id">ID:</label>
        <input id="id" type="text" th:field="*{id}" placeholder="Enter ID">
        <label for="address">Address:</label>
        <input id="address" type="text" th:field="*{address}" placeholder="Enter address">
        <label for="password">Password:</label>
        <input id="password" type="password" th:field="*{password}" placeholder="Enter Password">
        <label for="confirmPassword">confirm Password:</label>
        <input id="confirmPassword" type="password" th:field="*{confirmPassword}" placeholder="confirm password ">
        <label for="phone">Phone Number:</label>
        <input id="phone" type="text" th:field="*{phone}" placeholder="Enter Phone number">
       <label for="faculty">faculty:</label>
        <input id="faculty" type="text" th:field="*{faculty}" placeholder="faculty">
        <button type="submit">Sign up</button><br><br>
        <a th:href="@{/login}">already have an account</a><br>
    </form>
</div>
</body>

</html>
